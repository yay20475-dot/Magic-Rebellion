<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take a Walk Fight</title>

<style>

html,body{
    margin:0;
    width:100%;
    min-height:100vh;
}

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#game{
    width:100%;
    max-width:900px;
    margin:auto;
}

.row{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.card{
    width:60px;
    background:#222;
    border:1px solid #555;
    padding:5px;
}

.card img{
    width:100%;
    height:60px;
    object-fit:cover;
}

.boss-card{
    width:95%;
    max-width:100px;
    margin:auto;
    background:#222;
    border:1px solid #555;
    padding:5px;
}

.boss-card img{
    width:100%;
    height:100px;
    object-fit:cover;
}

.bar{
    width:100%;
    height:18px;
    background:#333;
}

.hp{
    height:100%;
    background:red;
}

.note{
    position:fixed;
    font-size:32px;
    pointer-events:none;
    z-index:9999;
}

button{
    padding:8px 15px;
    margin:4px;
    font-size:16px;
}

#actions{
    margin-top:15px;
}

#log{
    width:95%;
    max-width:800px;
    height:80px;
    overflow-y:auto;
    background:#222;
    text-align:left;
    margin:auto;
    margin-top:15px;
    padding:10px;
}

</style>

</head>
<body>

<div id="game">

<h1>⚔ Grinder Saw Battle ⚔</h1>

<div class="row">

<div class="card">
<img src="https://i.ibb.co/hF69DM0M/1.jpg">
<h3>Kaito</h3>
<div class="bar">
<div class="hp" id="hp0"></div>
</div>
<p id="txt0"></p>
</div>

<div class="card">
<img src="https://i.ibb.co/Wvwd2Tcx/2.jpg">
<h3>Elena</h3>
<div class="bar">
<div class="hp" id="hp1"></div>
</div>
<p id="txt1"></p>
</div>

<div class="card">
<img src="https://i.ibb.co/35mZkCmg/3.jpg">
<h3>Ryker</h3>
<div class="bar">
<div class="hp" id="hp2"></div>
</div>
<p id="txt2"></p>
</div>

<div class="card">
<img src="https://i.ibb.co/b52T8jRr/4.jpg">
<h3>Aria</h3>
<div class="bar">
<div class="hp" id="hp3"></div>
</div>
<p id="txt3"></p>
</div>

</div>

<br>

<div class="boss-card">
<img src="https://i.ibb.co/yFSZkjLD/5.jpg">
<h2>Grinder Saw</h2>
<div class="bar">
<div class="hp" id="bossHP"></div>
</div>
<p id="bossText"></p>
</div>

<h2 id="turnText"></h2>

<div id="actions">
<button onclick="attack()">Attack</button>
<button onclick="skill()">Skill</button>
</div>

<div id="log"></div>

</div>

<script>

let team=[

{
name:"Kaito",
hp:120,
maxHp:120,
atk:15,
cd:0,
hide:0,
dot:0
},

{
name:"Elena",
hp:100,
maxHp:100,
atk:12,
cd:0,
dot:0
},

{
name:"Ryker",
hp:130,
maxHp:130,
atk:16,
cd:0,
dot:0
},

{
name:"Aria",
hp:110,
maxHp:110,
atk:14,
cd:0,
dot:0
}

];

let boss={
hp:500,
maxHp:500,
atk:28,
skillCd:5
};

let lastTurn = -1;
let skipCount = [0,0,0,0];
let turn =
Math.floor(
    Math.random()*team.length
);
let speedBuff=0;
let cdBuffTurns = 0;

const logDiv=
document.getElementById("log");

function log(t){

logDiv.innerHTML+=t+"<br>";
logDiv.scrollTop=
logDiv.scrollHeight;

}

function update(){

for(let i=0;i<4;i++){

    let p=team[i];

    let card =
    document.querySelectorAll(".card img")[i];

    if(p.hide > 0){

        card.style.opacity = "0";

    }else{

        card.style.opacity = "1";

    }

    document.getElementById(
    "hp"+i
    ).style.width=
    (p.hp/p.maxHp*100)+"%";

    let cdText=
    p.cd>0 ?
    " CD:"+p.cd :
    "";

    document.getElementById(
    "txt"+i
    ).innerText=
    p.hp+"/"+p.maxHp+
    cdText+
    (p.hide>0?" HIDDEN":"");
}

bossHP.style.width=
(boss.hp/boss.maxHp*100)+"%";

bossText.innerText=
boss.hp+"/"+boss.maxHp;

let c = 0;

while(
    team[turn].hp <= 0 &&
    c < team.length
){

    turn++;

    if(turn >= team.length)
    turn = 0;

    c++;

}

turnText.innerText=
"Turn: "+
team[turn].name;

}

function nextTurn(){

    if(boss.hp<=0){
        log("🎉 Victory!");
        disable();
        return;
    }

    let alive = team.filter(p => p.hp > 0);

    if(alive.length === 0){
        log("💀 Defeat!");
        disable();
        return;
    }

    // ===== STATUS EFFECTS =====
    for(let p of team){

        let reduce = 1;

        if(cdBuffTurns > 0 && p.name !== "Ryker"){
            reduce = 2;
        }

        p.cd = Math.max(0, p.cd - reduce);

        if(p.hide > 0) p.hide--;

        if(p.dot > 0){
            p.hp -= 10;
            p.dot--;
            if(p.hp < 0) p.hp = 0;
            log(p.name + " takes 10 bleed damage");
        }

        // skip counter
        if(p.hp > 0){
            if(p === team[turn]){
                skipCount[team.indexOf(p)] = 0;
            }else{
                skipCount[team.indexOf(p)]++;
            }
        }
    }

    if(cdBuffTurns > 0) cdBuffTurns--;

    // ===== CHỌN LƯỢT =====
    let priority = [];

    for(let i=0;i<team.length;i++){
        if(team[i].hp > 0 && skipCount[i] >= 3){
            priority.push(i);
        }
    }

    if(priority.length > 0){
        turn = priority[Math.floor(Math.random()*priority.length)];
    }else{
let aliveIdx = team
    .map((p,i)=>i)
    .filter(
        i =>
        team[i].hp > 0 &&
        i !== lastTurn
    );

if(aliveIdx.length === 0){

    aliveIdx = team
    .map((p,i)=>i)
    .filter(i => team[i].hp > 0);

}

turn =
aliveIdx[
    Math.floor(
        Math.random()*aliveIdx.length
    )
];
    }

lastTurn = turn;

    skipCount[turn] = 0;

    bossTurn();
    update();
}

function attack(){

let p=
team[turn];

if(p.hp<=0)return;

let bonus=
speedBuff>0 ? 10 : 0;

let dmg=
p.atk+
Math.floor(
Math.random()*8
)+bonus;

boss.hp-=dmg;

if(boss.hp<0)
boss.hp=0;

if(p.name==="Kaito"){

    log(
        p.name+
        " attacks for "+
        dmg
    );

}

else if(p.name==="Elena"){

    log(
        p.name+
        " swings staff for "+
        dmg
    );

}

else if(p.name==="Ryker"){

    log(
        p.name+
        " punches for "+
        dmg
    );

}

else if(p.name==="Aria"){

    log(
        p.name+
        " swings flute for "+
        dmg
    );

}

if(speedBuff>0)
speedBuff--;

update();

nextTurn();

}

function ariaNotes(){

    let img =
    document.querySelectorAll(
        ".card img"
    )[3];

    let rect =
    img.getBoundingClientRect();

    let cx =
    rect.left +
    rect.width/2;

    let cy =
    rect.top +
    rect.height/2;

    for(let i=0;i<8;i++){

        let note =
        document.createElement(
            "div"
        );

        note.className =
        "note";

        note.innerHTML =
        "🎶";

        document.body
        .appendChild(note);

        let ang =
        i*Math.PI*2/8;

        let dist =
        50;

        note.style.left =
        cx+"px";

        note.style.top =
        cy+"px";

        note.animate([
        {
            transform:
            "translate(0,0)",
            opacity:1
        },
        {
            transform:
            `translate(
            ${Math.cos(ang)*dist}px,
            ${Math.sin(ang)*dist}px
            )`,
            opacity:0
        }
        ],{
            duration:1000,
            easing:"linear"
        });

        setTimeout(
            ()=>note.remove(),
            1000
        );
    }
}

function skill(){

let p=
team[turn];

if(p.hp<=0){

    nextTurn();
    return;

}

if(p.cd>0){

log("Skill cooldown!");
return;

}

if(p.name==="Kaito"){

p.hide=3;
p.cd=5;

log(
"Kaito used Fool Hat!"
);

}

else if(
p.name==="Elena"
){

p.cd=3;

for(let m of team){

if(m.hp>0){

m.hp=
Math.min(
m.maxHp,
m.hp+35
);

}

}

log(
"Elena used Heal Staff!"
);

}

else if(
p.name==="Ryker"
){

speedBuff = 3;

cdBuffTurns = 3;

p.cd = 4;

log(
"Ryker used Speed Boost!"
);

}

else if(
p.name==="Aria"
){

    ariaNotes();

    p.cd=3;

    let total=0;

    for(let i=0;i<5;i++){

        total+=
        8+
        Math.floor(
            Math.random()*8
        );

    }

    boss.hp-=total;

    if(boss.hp<0)
    boss.hp=0;

    log(
        "Aria used Bash Song for "+
        total
    );

}

update();

nextTurn();

}

function bossTurn(){

    if(boss.hp<=0)
    return;

    let targets=
    team.filter(
        p=>p.hp>0
    );

    if(targets.length===0)
    return;

    let t=
    targets[
        Math.floor(
            Math.random()*
            targets.length
        )
    ];

    if(
        t.name==="Kaito" &&
        t.hide>0
    ){

        log(
            "🌀 Grinder Saw attacked Kaito, but Fool Hat avoided the attack!"
        );

        return;

    }

    if(boss.skillCd<=0){

        let dmg = 60;

        t.hp -= dmg;

        if(t.hp < 0)
        t.hp = 0;

        t.dot = 3;

        boss.skillCd = 5;

        log(
            "🪚🩸 Grinder Saw used SAW ATTACK on "+
            t.name+
            " for "+
            dmg+
            " damage and inflicted Bleed!"
        );

        return;

    }

    boss.skillCd--;

    let dmg=
    boss.atk+
    Math.floor(
        Math.random()*12
    );

    t.hp-=dmg;

    if(t.hp<0)
    t.hp=0;

    log(
        "🪚 Grinder Saw hits "+
        t.name+
        " for "+
        dmg
    );

}

function disable(){

let b=
document.querySelectorAll(
"button"
);

for(let x of b){

x.disabled=true;

}

}

update();

log(
"Battle Start!"
);

</script>

</body>
</html>
