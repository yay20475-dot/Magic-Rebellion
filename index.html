<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Magic Rebellion</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    touch-action:none;
    font-family:sans-serif;
}

canvas{
    display:block;
    background:
    radial-gradient(circle at center,
    #1b1b35,
    #050510 70%);
}

#select{

    position:absolute;
    inset:0;

    background:
    rgba(0,0,0,0.92);

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    color:white;
    z-index:10;
}

.card{

    width:260px;
    padding:14px;
    margin:10px;

    border:2px solid white;
    border-radius:14px;

    text-align:center;

    background:
    rgba(255,255,255,0.06);
}

#ui{

    position:absolute;
    top:10px;
    left:10px;

    color:white;
    z-index:5;

    text-shadow:0 0 5px black;
}

.bar{

    width:260px;
    height:16px;

    background:#222;

    border-radius:8px;
    overflow:hidden;

    margin-bottom:8px;
}

.fill{
    height:100%;
}

#hpFill{
    background:#44ff88;
}

#bossFill{
    background:
    linear-gradient(to right,
    #ff0044,
    #ff88aa);
}

#skillBtn{

    position:absolute;

    right:25px;
    bottom:25px;

    width:90px;
    height:90px;

    border-radius:50%;

    background:
    rgba(100,120,255,0.5);

    border:3px solid white;

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
    font-weight:bold;
    z-index:5;
}

</style>
</head>

<body>

<div id="select">

<h1>
MAGIC REBELLION
</h1>

<div class="card"
onclick="startGame(0)">
Astraea<br>
The Strongest Dragon Creation Mage in the Universe
</div>

<div class="card"
onclick="startGame(1)">
Florensya<br>
Nature Mage
</div>

<div class="card"
onclick="startGame(2)">
Lumina<br>
Light Mage
</div>

<div class="card"
onclick="startGame(3)">
Velocity<br>
Super Speed Mage
</div>

</div>

<div id="ui">

HP
<div class="bar">
<div id="hpFill"
class="fill"></div>
</div>

Boss HP - Name Boss: Skorvax
<div class="bar">
<div id="bossFill"
class="fill"></div>
</div>

<div id="info"></div>

</div>

<div id="skillBtn">
SKILL
</div>

<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const bossImg =
new Image();

bossImg.src =
"https://i.ibb.co/LXKjH0qx/image.png";

const charImgs=[];

[
"https://i.ibb.co/5XtYw8Sv/image.png",
"https://i.ibb.co/G3THpj7n/image.png",
"https://i.ibb.co/V0K4cVB6/image.png",
"https://i.ibb.co/yFbcn9hs/image.png"
]

.forEach(src=>{

    let img = new Image();

    img.src = src;

    charImgs.push(img);
});

const names = [

"Astraea",
"Florensya",
"Lumina",
"Velocity"

];

let gameOver = false;

let currentChar = 0;

let gameStarted=false;

let frame=0;

let screenFlash=0;

let bossFreeze=0;

let fastMode=0;

let skillCooldown=0;

let currentElement="";

let player={

    x:canvas.width/2,
    y:canvas.height-140,

    hp:10,
    maxHp:10,

    invuln:0
};

let boss={

    x:canvas.width/2,
    y:140,

    hp:25000,
    maxHp:25000
};

let clones=[];

let enemyBullets=[];

let playerBullets=[];

let dragonFire=[];

function startGame(id){

    currentChar=id;

    gameStarted=true;

    document
    .getElementById("select")
    .style.display="none";

    requestAnimationFrame(loop);
}

class Bullet{

    constructor(
        x,y,
        ang,
        spd,
        color,
        r=5,
        dmg=1
    ){

        this.x=x;
        this.y=y;

        this.vx=
        Math.cos(ang)*spd;

        this.vy=
        Math.sin(ang)*spd;

        this.color=color;

        this.r=r;

        this.dmg=dmg;
    }

    update(){

        this.x+=this.vx;
        this.y+=this.vy;
    }

    draw(){

        ctx.shadowColor=
        this.color;

        ctx.shadowBlur=15;

        ctx.fillStyle=
        this.color;

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.r,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.shadowBlur=0;
    }
}

function spawnPattern(){

    if(bossFreeze>0)
    return;

    let cycle=
    frame%1400;

    let allBosses=
    [boss,...clones];

    // =========================
    // PHASE 1
    // =========================

    if(cycle<350){

        if(frame%40===0){

            allBosses.forEach(b=>{

                for(let i=0;i<24;i++){

                    enemyBullets.push(

                        new Bullet(
                            b.x,
                            b.y,

                            i*Math.PI*2/24,

                            2.5,

                            "#66ff99",

                            7
                        )
                    );
                }
            });
        }
    }

    // =========================
    // PHASE 2
    // =========================

    else if(cycle<700){

        if(frame%20===0){

            allBosses.forEach(b=>{

                let ang=
                Math.atan2(
                    player.y-b.y,
                    player.x-b.x
                );

                enemyBullets.push(

                    new Bullet(
                        b.x,
                        b.y,

                        ang+
                        (Math.random()-0.5)*0.5,

                        7,

                        "#bb44ff",

                        8
                    )
                );
            });
        }
    }

    // =========================
    // PHASE 3
    // =========================

    else if(cycle<1050){

        if(frame%40===0){

            let x=
            Math.random()*
            canvas.width;

            enemyBullets.push({

                x:x,
                y:-100,

                w:22,
                h:160,

                vy:10,

                update(){

                    this.y+=this.vy;
                },

                draw(){

                    ctx.fillStyle=
                    "rgba(255,0,0,0.8)";

                    ctx.fillRect(
                        this.x-this.w/2,
                        this.y,
                        this.w,
                        this.h
                    );
                }
            });
        }
    }

    // =========================
    // FINAL WATER
    // =========================

    else{

        if(frame%50===0){

            for(let i=0;i<4;i++){

                let ang=
                i*Math.PI*2/4;

                let drop=
                new Bullet(
                    boss.x,
                    boss.y,
                    ang,
                    2,
                    "black",
                    12,
                    2
                );

                drop.bounced=false;

                drop.update=function(){

                    this.x+=this.vx;
                    this.y+=this.vy;

                    if(!this.bounced){

                        let hit=false;

                        if(
                            this.x<=this.r||
                            this.x>=
                            canvas.width-this.r
                        ){

                            this.vx*=-1;
                            hit=true;
                        }

                        if(
                            this.y<=this.r||
                            this.y>=
                            canvas.height-this.r
                        ){

                            this.vy*=-1;
                            hit=true;
                        }

                        if(hit){

                            this.bounced=true;
                        }
                    }
                };

drop.draw=function(){

    ctx.save();

    ctx.translate(
        this.x,
        this.y
    );

    let ang=
    Math.atan2(
        this.vy,
        this.vx
    );

    ctx.rotate(
        ang+
        Math.PI/2
    );

    ctx.shadowColor=
    "black";

    ctx.shadowBlur=20;

    ctx.fillStyle=
    "#111";

    // thân nước

    ctx.beginPath();

    ctx.moveTo(0,-18);

    ctx.quadraticCurveTo(
        18,-8,
        12,10
    );

    ctx.lineTo(6,26);

    ctx.lineTo(-6,26);

    ctx.lineTo(-12,10);

    ctx.quadraticCurveTo(
        -18,-8,
        0,-18
    );

    ctx.fill();

    // 4 chân

    ctx.strokeStyle=
    "#000";

    ctx.lineWidth=4;

    for(let i=-1.5;i<=1.5;i++){

        ctx.beginPath();

        ctx.moveTo(i*6,24);

        ctx.lineTo(i*10,36);

        ctx.stroke();
    }

    // mắt

    ctx.fillStyle=
    "red";

    ctx.beginPath();

    ctx.arc(-5,-2,2,0,Math.PI*2);

    ctx.arc(5,-2,2,0,Math.PI*2);

    ctx.fill();

    ctx.restore();
};

                enemyBullets.push(drop);
            }
        }
    }

    // =========================
    // CLONES
    // =========================

    if(
        boss.hp<15000 &&
        clones.length===0
    ){

        clones.push(

            {
                x:220,
                y:180
            },

            {
                x:canvas.width-220,
                y:180
            },

            {
                x:canvas.width/2,
                y:260
            }
        );
    }
}

function useSkill(){

    if(skillCooldown>0)
    return;

    // =========================
    // ASTRAEA
    // =========================

    if(currentChar===0){

        skillCooldown=480;

        let skills=[

            "light",
            "dark",
            "earth",
            "water",
            "fire",
            "wind"
        ];

        currentElement=

        skills[
            Math.floor(
                Math.random()*6
            )
        ];

        // LIGHT

        if(currentElement==="light"){

            screenFlash=80;

            bossFreeze=80;

            for(let i=0;i<40;i++){

                playerBullets.push(

                    new Bullet(
                        player.x,
                        player.y,

                        i*Math.PI*2/40,

                        7,

                        "#ffffaa",

                        6,

                        6
                    )
                );
            }
        }

        // DARK

        else if(currentElement==="dark"){

            for(let i=0;i<5;i++){

                let orb=
                new Bullet(
                    player.x,
                    player.y,

                    i*Math.PI*2/5,

                    4,

                    "#5522aa",

                    24,

                    1
                );

                orb.update=function(){

                    let ang=
                    Math.atan2(
                        boss.y-this.y,
                        boss.x-this.x
                    );

                    this.vx=
                    Math.cos(ang)*4;

                    this.vy=
                    Math.sin(ang)*4;

                    this.x+=this.vx;
                    this.y+=this.vy;
                };

                playerBullets.push(orb);
            }
        }

        // EARTH

        else if(currentElement==="earth"){

            for(let i=0;i<18;i++){

                let rock=
                new Bullet(
                    player.x,
                    canvas.height+50,

                    -Math.PI/2,

                    8,

                    "#886633",

                    16,

                    10
                );

                rock.x=
                (canvas.width/18)*i;

                playerBullets.push(rock);
            }
        }

        // WATER

        else if(currentElement==="water"){

            for(let i=0;i<60;i++){

                let ang=
                i*Math.PI*2/60;

                let drop=
                new Bullet(
                    player.x,
                    player.y,
                    ang,
                    5,
                    "skyblue",
                    8,
                    5
                );

                playerBullets.push(drop);
            }
        }

        // FIRE

        else if(currentElement==="fire"){

            for(let i=0;i<10;i++){

                let fire=
                new Bullet(
                    player.x,
                    player.y,

                    -Math.PI/2+
                    (Math.random()-0.5)*0.6,

                    10,

                    "#ff6633",

                    14,

                    9
                );

                playerBullets.push(fire);
            }
        }

        // WIND

        else if(currentElement==="wind"){

            for(let i=0;i<50;i++){

                let wind=
                new Bullet(
                    player.x,
                    player.y,

                    i*Math.PI*2/50,

                    9,

                    "#aaffff",

                    4,

                    3
                );

                playerBullets.push(wind);
            }
        }
    }

    // =========================
    // FLORENSYA
    // =========================

    if(currentChar===1){

        skillCooldown=600;

        player.hp=
        Math.min(
            player.maxHp,
            player.hp+1
        );

        bossFreeze=140;
    }

    // =========================
    // LUMINA
    // =========================

    if(currentChar===2){

        skillCooldown=420;

        screenFlash=240;

        bossFreeze=240;
    }

    // =========================
    // VELOCITY
    // =========================

    if(currentChar===3){

        skillCooldown=520;

        fastMode=300;
    }
}

document
.getElementById("skillBtn")

.addEventListener(
"touchstart",
e=>{

    e.preventDefault();

    useSkill();
});

let lastX,lastY;

window.addEventListener(
"touchstart",
e=>{

    lastX=
    e.touches[0].clientX;

    lastY=
    e.touches[0].clientY;
});

window.addEventListener(
"touchmove",
e=>{

    if(!gameStarted)
    return;

    e.preventDefault();

    let x=
    e.touches[0].clientX;

    let y=
    e.touches[0].clientY;

    let mult=
    fastMode>0 ?
    2.7 :
    1;

    player.x +=
    (x-lastX)*mult;

    player.y +=
    (y-lastY)*mult;

    lastX=x;
    lastY=y;

    player.x=
    Math.max(
        20,
        Math.min(
            canvas.width-20,
            player.x
        )
    );

    player.y=
    Math.max(
        20,
        Math.min(
            canvas.height-20,
            player.y
        )
    );

},{passive:false});

function update(){

    frame++;

    if(player.invuln>0)
    player.invuln--;

    if(skillCooldown>0)
    skillCooldown--;

    if(screenFlash>0)
    screenFlash--;

    if(bossFreeze>0)
    bossFreeze--;

    if(fastMode>0)
    fastMode--;

    // =========================
    // BOSS MOVE
    // =========================

    if(bossFreeze<=0){

        boss.x=
        canvas.width/2+
        Math.sin(frame*0.01)*280;

        boss.y=
        140+
        Math.sin(frame*0.02)*45;
    }

    clones.forEach((c,i)=>{

        c.x +=
        Math.sin(
            frame*0.02+i
        )*1.4;

        c.y +=
        Math.cos(
            frame*0.03+i
        );
    });

    spawnPattern();

    // =========================
    // PASSIVE DRAGON
    // =========================

    if(
        currentChar===0 &&
        frame%6===0
    ){

        let fire=
        new Bullet(
            player.x-60,
            player.y-30,

            -Math.PI/2+
            (Math.random()-0.5)*0.5,

            10,

            "#ff6633",

            5,

            3
        );

        dragonFire.push(fire);
    }

    // =========================
    // NORMAL SHOT
    // =========================

    if(frame%5===0){

        playerBullets.push(

            new Bullet(
                player.x,
                player.y,

                -Math.PI/2,

                11,

                "white",

                4,

                2
            )
        );
    }

    // =========================
    // ENEMY UPDATE
    // =========================

    enemyBullets.forEach((b,i)=>{

        b.update();

        let hit=false;

        if(b.r){

            hit=

            Math.hypot(
                b.x-player.x,
                b.y-player.y
            )

            <

            10+b.r;
        }

        else{

            hit=

            player.x>
            b.x-b.w/2 &&

            player.x<
            b.x+b.w/2 &&

            player.y>b.y &&

            player.y<
            b.y+b.h;
        }

        if(
            hit &&
            player.invuln<=0
        ){

            player.hp--;

            player.invuln=60;

if(player.hp<=0){

    gameOver = true;

    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "red";
    ctx.font = "bold 80px sans-serif";
    ctx.textAlign = "center";

    ctx.fillText(
        "GAME OVER",
        canvas.width/2,
        canvas.height/2
    );

    alert("GAME OVER");

    return;
}

        }
    });

    // =========================
    // PLAYER DAMAGE
    // =========================

    [...playerBullets,...dragonFire]

    .forEach((b,i)=>{

        b.update();

        let targets=
        [boss,...clones];

        targets.forEach(t=>{

            if(

                Math.hypot(
                    b.x-t.x,
                    b.y-t.y
                )

                <

                60

            ){

                boss.hp-=b.dmg;
            }
        });
    });

    // =========================
    // UI
    // =========================

    document
    .getElementById("hpFill")
    .style.width=

    (player.hp/player.maxHp)*100
    +"%";

    document
    .getElementById("bossFill")
    .style.width=

    (boss.hp/boss.maxHp)*100
    +"%";

    document
    .getElementById("info")
    .innerHTML=

    names[currentChar]+

    "<br>Skill CD: "+

    Math.ceil(skillCooldown/60)+

    (currentChar===0 ?

    "<br>Element: "+
    currentElement

    :

    "");

if(boss.hp<=0){

    gameOver = true;

    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#66ffcc";
    ctx.font = "bold 80px sans-serif";
    ctx.textAlign = "center";

    ctx.fillText(
        "VICTORY",
        canvas.width/2,
        canvas.height/2
    );

    alert("VICTORY");

    return;
}

}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    // FLASH

    if(screenFlash>0){

        ctx.fillStyle=
        "rgba(255,255,255,0.35)";

        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );
    }

    // BOSS

    ctx.drawImage(
        bossImg,
        boss.x-80,
        boss.y-80,
        160,
        160
    );

    clones.forEach(c=>{

        ctx.globalAlpha=0.6;

        ctx.drawImage(
            bossImg,
            c.x-55,
            c.y-55,
            110,
            110
        );

        ctx.globalAlpha=1;
    });

// EFFECT TRÓI FLORENSYA

if(
    currentChar===1 &&
    bossFreeze>0
){

    ctx.save();

    ctx.translate(
        boss.x,
        boss.y
    );

    for(let i=0;i<6;i++){

        ctx.strokeStyle=
        "#44aa44";

        ctx.lineWidth=6;

        ctx.shadowColor=
        "#66ff66";

        ctx.shadowBlur=10;

        ctx.beginPath();

        for(let t=0;t<Math.PI*2;t+=0.15){

            let r=
            30+i*8+
            Math.sin(
                t*6+
                frame*0.08
            )*4;

            let x=
            Math.cos(
                t+i
            )*r;

            let y=
            Math.sin(
                t+i
            )*r;

            if(t===0){

                ctx.moveTo(x,y);

            }else{

                ctx.lineTo(x,y);
            }
        }

        ctx.stroke();
    }

    // lá cây

    for(let i=0;i<10;i++){

        let ang=
        i*Math.PI*2/10+
        frame*0.02;

        let x=
        Math.cos(ang)*55;

        let y=
        Math.sin(ang)*55;

        ctx.fillStyle=
        "#88ff88";

        ctx.beginPath();

        ctx.ellipse(
            x,
            y,
            8,
            4,
            ang,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    ctx.restore();
}

    // PLAYER

    ctx.drawImage(

        charImgs[currentChar],

        player.x-35,
        player.y-35,

        70,
        70
    );

    // HITBOX

    ctx.fillStyle="lime";

    ctx.beginPath();

    ctx.arc(
        player.x,
        player.y,
        3,
        0,
        Math.PI*2
    );

    ctx.fill();

    // DRAGON

    if(currentChar===0){

        ctx.fillStyle=
        "#ff6633";

        ctx.beginPath();

        ctx.moveTo(
            player.x-70,
            player.y-25
        );

        ctx.lineTo(
            player.x-105,
            player.y-5
        );

        ctx.lineTo(
            player.x-80,
            player.y+15
        );

        ctx.closePath();

        ctx.fill();
    }

    enemyBullets.forEach(
        b=>b.draw()
    );

    playerBullets.forEach(
        b=>b.draw()
    );

    dragonFire.forEach(
        b=>b.draw()
    );
}

function loop(){

    if(gameOver)
    return;

    draw();

    update();

    requestAnimationFrame(loop);
}

</script>
</body>
</html>
