class Bullet{

    constructor(
        x,y,
        ang,
        spd,
        color,
        r=5,
        dmg=1
    ){

        this.x=x;
        this.y=y;

        this.vx=
        Math.cos(ang)*spd;

        this.vy=
        Math.sin(ang)*spd;

        this.color=color;

        this.r=r;

        this.dmg=dmg;
    }

    update(){

        this.x+=this.vx;
        this.y+=this.vy;
    }

    draw(){

        ctx.shadowColor=
        this.color;

        ctx.shadowBlur=15;

        ctx.fillStyle=
        this.color;

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.r,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.shadowBlur=0;
    }
}

function spawnPatternChapter1(){

    frame % 1200;

                update(){

                    this.x += this.vx;
                    this.y += this.vy;

                    this.life--;

                    if(this.life === 0){

                        for(let i=0;i<18;i++){

                                i*Math.PI*2/18,

                                1
                            );

                            b.life = 60;

                            b.update = function(){

                                this.x += this.vx;
                                this.y += this.vy;

                                this.life--;

                                if(this.life <= 0){
                                    this.dead = true;
                                }
                            };

                            enemyBullets.push(b);
                        }

                        screenShake = 25;
                    }

                    if(this.life <= -10){
                        this.dead = true;
                    }
                },

                draw(){

                    ctx.fillStyle =
                    "#bfefff";

                    ctx.shadowColor =
                    "#ccffff";

                    ctx.shadowBlur = 25;

                    ctx.beginPath();

                    ctx.arc(
                        this.x,
                        this.y,
                        this.r,
                        0,
                        Math.PI*2
                    );

                    ctx.fill();

                    ctx.shadowBlur = 0;
                }
            });
        }
    }

    // =================
    // PHASE 2
    // ICE PILLAR

    else if(cycle < 800){

        if(frame % 100 === 0){

function spawnPattern(){

    if(bossFreeze>0)
    return;

    // CHAPTER 1
    if(selectedChapter === 1){

        // STAGE 1
        if(stage === 1){

            spawnPatternChapter1();
        }

        // STAGE 2
        else{

            spawnPatternVireltha();
        }

        return;
    }

    // CHAPTER 2
    if(selectedChapter === 2){

        // STAGE 2
        if(stage === 2){

            spawnPatternNyxara();
            return;
        }
    }

    let cycle=
    frame%1400;

    let allBosses=
    [boss,...clones];

    if(cycle<350){

        if(frame%40===0){

            allBosses.forEach(b=>{

                for(let i=0;i<24;i++){

                    enemyBullets.push(

                        new Bullet(
                            b.x,
                            b.y,
                            i*Math.PI*2/24,
                            2.5,
                            "#66ff99",
                            7
                        )
                    );
                }
            });
        }
    }

    else if(cycle<700){

        if(frame%20===0){

            allBosses.forEach(b=>{

                let ang=
                Math.atan2(
                    player.y-b.y,
                    player.x-b.x
                );

                enemyBullets.push(

                    new Bullet(
                        b.x,
                        b.y,
                        ang+(Math.random()-0.5)*0.5,
                        7,
                        "#2f6b00",
                        8
                    )
                );
            });
        }
    }

    else if(cycle<1050){

        if(frame%40===0){

            let x=
            Math.random()*canvas.width;

            enemyBullets.push({

                x:x,
                y:-100,
                w:22,
                h:160,
                vy:10,

                update(){
                    this.y+=this.vy;
                },

                draw(){
                    ctx.fillStyle="rgba(255,0,0,0.8)";
                    ctx.fillRect(this.x-this.w/2,this.y,this.w,this.h);
                }
            });
        }
    }

    else{

        if(frame%50===0){

            for(let i=0;i<4;i++){

                let ang=i*Math.PI*2/4;

                let drop=new Bullet(
                    boss.x,
                    boss.y,
                    ang,
                    2,
                    "black",
                    12,
                    2
                );

                drop.bounced=false;

                drop.update=function(){

                    this.x+=this.vx;
                    this.y+=this.vy;

                    if(!this.bounced){

                        let hit=false;

                        if(this.x<=this.r||this.x>=canvas.width-this.r){
                            this.vx*=-1;
                            hit=true;
                        }

                        if(this.y<=this.r||this.y>=canvas.height-this.r){
                            this.vy*=-1;
                            hit=true;
                        }

                        if(hit){
                            this.bounced=true;
                        }
                    }
                };

                drop.draw=function(){

                    ctx.save();
                    ctx.translate(this.x,this.y);

                    let ang=Math.atan2(this.vy,this.vx);
                    ctx.rotate(ang+Math.PI/2);

                    ctx.shadowColor="black";
                    ctx.shadowBlur=20;

                    ctx.fillStyle="#111";

                    ctx.beginPath();
                    ctx.moveTo(0,-18);
                    ctx.quadraticCurveTo(18,-8,12,10);
                    ctx.lineTo(6,26);
                    ctx.lineTo(-6,26);
                    ctx.lineTo(-12,10);
                    ctx.quadraticCurveTo(-18,-8,0,-18);
                    ctx.fill();

                    ctx.strokeStyle="#000";
                    ctx.lineWidth=4;

                    for(let i=-1.5;i<=1.5;i++){
                        ctx.beginPath();
                        ctx.moveTo(i*6,24);
                        ctx.lineTo(i*10,36);
                        ctx.stroke();
                    }

                    ctx.fillStyle="red";
                    ctx.beginPath();
                    ctx.arc(-5,-2,2,0,Math.PI*2);
                    ctx.arc(5,-2,2,0,Math.PI*2);
                    ctx.fill();

                    ctx.restore();
                };

                enemyBullets.push(drop);
            }
        }
    }

    if(boss.hp<15000 && clones.length===0){

        clones.push(
            {x:220,y:180},
            {x:canvas.width-220,y:180},
            {x:canvas.width/2,y:260}
        );
    }
}

                playerBullets.push(new Bullet(player.x,player.y,-Math.PI/2+(Math.random()-0.5)*0.6,10,"#ff6633",14,9));
            }
        }

        else if(currentElement==="wind"){

            for(let i=0;i<50;i++){
                playerBullets.push(new Bullet(player.x,player.y,i*Math.PI*2/50,9,"#aaffff",4,3));
            }
        }
    }

    if(currentChar===1){

        skillCooldown=600;
        player.hp=Math.min(player.maxHp,player.hp+1);
        bossFreeze=140;
    }

    if(currentChar===2){

        skillCooldown=420;
        screenFlash=240;
        bossFreeze=240;
    }

    if(currentChar===3){

        skillCooldown=520;
        fastMode=300;
    }
}

document.getElementById("skillBtn")
.addEventListener("touchstart",e=>{
    e.preventDefault();
    useSkill();
});

let lastX,lastY;

window.addEventListener("touchstart",e=>{
    lastX=e.touches[0].clientX;
    lastY=e.touches[0].clientY;
});

window.addEventListener("touchmove",e=>{
    if(!gameStarted) return;

    e.preventDefault();

    if(paralyzeTimer > 0 && Math.random() < 0.45){
        return;
    }

    let x=e.touches[0].clientX;
    let y=e.touches[0].clientY;

    let mult=fastMode>0?2.7:1;

    // NYXARA làm điều khiển khó hơn
    if(darkControl > 0){

        mult *= 0.45;

        player.x-=(x-lastX)*mult;
        player.y+=(y-lastY)*mult*0.5;
    }

    else{

        player.x+=(x-lastX)*mult;
        player.y+=(y-lastY)*mult;
    }

    lastX=x;
    lastY=y;

    player.x=Math.max(
        20,
        Math.min(canvas.width-20,player.x)
    );

    player.y=Math.max(
        20,
        Math.min(canvas.height-20,player.y)
    );

},{passive:false});

function update(){

    frame++;

    if(player.invuln>0) player.invuln--;
    if(skillCooldown>0) skillCooldown--;
    if(screenFlash>0) screenFlash--;
    if(bossFreeze>0) bossFreeze--;
    if(fastMode>0) fastMode--;

if(paralyzeTimer > 0)
paralyzeTimer--;

if(darkControl > 0)
darkControl--;

if(screenShake > 0)
screenShake--;

    if(bossFreeze<=0){
        boss.x=canvas.width/2+Math.sin(frame*0.01)*280;
        boss.y=140+Math.sin(frame*0.02)*45;
    }

    clones.forEach((c,i)=>{
        c.x+=Math.sin(frame*0.02+i)*1.4;
        c.y+=Math.cos(frame*0.03+i);
    });

    spawnPattern();

if(currentChar===0 && frame%6===0){

    let dragonX = player.x - 55;
    let dragonY = player.y - 10;

    dragonFire.push(
        new Bullet(
            dragonX - 66,
            dragonY - 2,
            -Math.PI/2+(Math.random()-0.5)*0.5,
            10,
            "#ff6633",
            5,
            3
        )
    );
}

    if(frame%5===0){
        playerBullets.push(new Bullet(player.x,player.y,-Math.PI/2,11,"white",4,2));
    }

    enemyBullets.forEach(b=>{
        b.update();

        let hit=false;

        if(b.r){
            hit=Math.hypot(b.x-player.x,b.y-player.y)<10+b.r;
        }else{
            hit=player.x>b.x-b.w/2 && player.x<b.x+b.w/2 && player.y>b.y && player.y<b.y+b.h;
        }

        if(hit && player.invuln<=0){
            player.hp--;
            player.invuln=60;

if(b.paralyze){

    paralyzeTimer = 180;
}

if(b.dark){

    darkControl = 240;
}

if(player.hp<=0){

    gameOver = true;

    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "red";
    ctx.font = "bold 80px sans-serif";
    ctx.textAlign = "center";

    ctx.fillText(
        "GAME OVER",
        canvas.width/2,
        canvas.height/2
    );

    alert("GAME OVER");

    return;
}

        }
    });

enemyBullets = enemyBullets.filter(b => !b.dead);

rainbowLaser.forEach(l=>l.update());

rainbowLaser =
rainbowLaser.filter(l=>!l.dead);

    [...playerBullets,...dragonFire].forEach(b=>{
        b.update();

        [boss,...clones].forEach(t=>{
            if(Math.hypot(b.x-t.x,b.y-t.y)<60){
                boss.hp-=b.dmg;
            }
        });
    });

    document.getElementById("hpFill").style.width=(player.hp/player.maxHp)*100+"%";
    document.getElementById("bossFill").style.width=(boss.hp/boss.maxHp)*100+"%";

    document.getElementById("info").innerHTML=
    names[currentChar]+"<br>Skill CD: "+Math.ceil(skillCooldown/60)+
    (currentChar===0?"<br>Element: "+currentElement:"");

if(boss.hp<=0){

    // =====================
    // STAGE 2
    // =====================

if(stage === 1){

    stage = 2;

    enemyBullets = [];
    playerBullets = [];
    dragonFire = [];
    clones = [];

    frame = 0;

    boss.x = canvas.width/2;
    boss.y = 140;

    // hồi full máu + 2 giây bất tử
    player.hp = player.maxHp;
    player.invuln = 120;

        if(selectedChapter === 1){

            boss.maxHp = 10000;
            boss.hp = 10000;

            document
            .querySelector("#ui")
            .innerHTML = `

HP
<div class="bar">
<div id="hpFill"
class="fill"></div>
</div>

Boss HP - Name Boss: Vireltha
<div class="bar">
<div id="bossFill"
class="fill"></div>
</div>

<div id="info"></div>
`;
        }

        else{

            boss.maxHp = 15000;
            boss.hp = 15000;

            document
            .querySelector("#ui")
            .innerHTML = `

HP
<div class="bar">
<div id="hpFill"
class="fill"></div>
</div>

Boss HP - Name Boss: Nyxara
<div class="bar">
<div id="bossFill"
class="fill"></div>
</div>

<div id="info"></div>
`;
        }

        return;
    }

    gameOver = true;

    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#66ffcc";
    ctx.font = "bold 80px sans-serif";
    ctx.textAlign = "center";

    ctx.fillText(
        "VICTORY",
        canvas.width/2,
        canvas.height/2
    );

    alert("VICTORY");

    return;
}

}

function draw(){

let shakeX=0,shakeY=0;

if(screenShake>0){
    shakeX=(Math.random()-0.5)*screenShake;
    shakeY=(Math.random()-0.5)*screenShake;
}

ctx.save();
ctx.translate(shakeX,shakeY);
ctx.clearRect(0,0,canvas.width,canvas.height);

if(screenFlash>0){
    ctx.fillStyle="rgba(255,255,255,0.35)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

let currentBossImg;

if(stage === 1){

    currentBossImg =
    selectedChapter === 1
    ? bossImg1
    : bossImg2;
}

else{

    currentBossImg =
    selectedChapter === 1
    ? bossImg3
    : bossImg4;
}

ctx.drawImage(
    currentBossImg,
    boss.x-80,
    boss.y-80,
    160,
    160
);

clones.forEach(c=>{
    ctx.globalAlpha=0.6;
    ctx.drawImage(bossImg2,c.x-55,c.y-55,110,110);
    ctx.globalAlpha=1;
});

// EFFECT TRÓI FLORENSYA

if(
    currentChar===1 &&
    bossFreeze>0
){

    ctx.save();

    ctx.translate(
        boss.x,
        boss.y
    );

    for(let i=0;i<6;i++){

        ctx.strokeStyle=
        "#44aa44";

        ctx.lineWidth=6;

        ctx.shadowColor=
        "#66ff66";

        ctx.shadowBlur=10;

        ctx.beginPath();

        for(let t=0;t<Math.PI*2;t+=0.15){

            let r=
            30+i*8+
            Math.sin(
                t*6+
                frame*0.08
            )*4;

            let x=
            Math.cos(
                t+i
            )*r;

            let y=
            Math.sin(
                t+i
            )*r;

            if(t===0){

                ctx.moveTo(x,y);

            }else{

                ctx.lineTo(x,y);
            }
        }

        ctx.stroke();
    }

    // lá cây

    for(let i=0;i<10;i++){

        let ang=
        i*Math.PI*2/10+
        frame*0.02;

        let x=
        Math.cos(ang)*55;

        let y=
        Math.sin(ang)*55;

        ctx.fillStyle=
        "#88ff88";

        ctx.beginPath();

        ctx.ellipse(
            x,
            y,
            8,
            4,
            ang,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    ctx.restore();
}

// PARALYZE EFFECT

if(paralyzeTimer > 0){

    ctx.strokeStyle =
    "#bb66ff";

    ctx.lineWidth = 4;

    for(let i=0;i<6;i++){

        ctx.beginPath();

        ctx.moveTo(
            player.x+(Math.random()-0.5)*40,
            player.y+(Math.random()-0.5)*40
        );

        ctx.lineTo(
            player.x+(Math.random()-0.5)*40,
            player.y+(Math.random()-0.5)*40
        );

        ctx.stroke();
    }
}

// DARK CONTROL EFFECT

if(darkControl > 0){

    ctx.fillStyle =
    "rgba(0,0,0,0.35)";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );
}

// RỒNG CAM CẠNH ASTRAEA

if(currentChar === 0){

    let dragonX = player.x - 55;
    let dragonY = player.y - 10;

    ctx.save();

    ctx.translate(dragonX, dragonY);

    // đuôi dài mảnh
    ctx.strokeStyle = "#ff8844";
    ctx.lineWidth = 6;
    ctx.lineCap = "round";

    ctx.beginPath();
    ctx.moveTo(34,0);
    ctx.quadraticCurveTo(
        60,10,
        78,30
    );
    ctx.stroke();

    // thân dài
    ctx.fillStyle = "#ff6633";

    ctx.beginPath();
    ctx.ellipse(
        10,0,
        30,10,
        0,
        0,
        Math.PI*2
    );
    ctx.fill();

    // cổ
    ctx.save();

    ctx.translate(-12,-2);
    ctx.rotate(-0.2);

    ctx.fillRect(
        -12,
        -5,
        24,
        10
    );

    ctx.restore();

    // đầu nhỏ
    ctx.beginPath();
    ctx.ellipse(
        -28,-4,
        14,10,
        -0.1,
        0,
        Math.PI*2
    );
    ctx.fill();

    // mõm nhọn
    ctx.beginPath();
    ctx.moveTo(-38,-7);
    ctx.lineTo(-52,-4);
    ctx.lineTo(-38,2);
    ctx.fill();

    // cánh trên
    ctx.fillStyle = "#ff9955";

    ctx.beginPath();
    ctx.moveTo(0,-4);
    ctx.quadraticCurveTo(
        -10,-34,
        16,-16
    );
    ctx.lineTo(10,-2);
    ctx.fill();

    // cánh dưới
    ctx.beginPath();
    ctx.moveTo(4,6);
    ctx.quadraticCurveTo(
        -4,24,
        20,14
    );
    ctx.lineTo(14,4);
    ctx.fill();

    // sừng
    ctx.strokeStyle = "#ffe0aa";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(-32,-10);
    ctx.lineTo(-38,-18);

    ctx.moveTo(-24,-11);
    ctx.lineTo(-26,-20);

    ctx.stroke();

    // mắt
    ctx.fillStyle = "yellow";

    ctx.beginPath();
    ctx.arc(
        -33,-5,
        2,
        0,
        Math.PI*2
    );

    ctx.fill();

    // glow
    ctx.shadowColor = "#ff8844";
    ctx.shadowBlur = 18;

    // lửa ở miệng
    ctx.fillStyle = "#ffaa44";

    ctx.beginPath();
    ctx.moveTo(-52,-4);
    ctx.lineTo(-66,-8);
    ctx.lineTo(-62,-1);
    ctx.lineTo(-70,2);
    ctx.lineTo(-54,1);

    ctx.fill();

    ctx.restore();
}

ctx.drawImage(charImgs[currentChar],player.x-35,player.y-35,70,70);

rainbowLaser.forEach(l=>l.draw());

enemyBullets.forEach(b=>b.draw());
playerBullets.forEach(b=>b.draw());
dragonFire.forEach(b=>b.draw());

ctx.restore();
}

function loop(){
    if(gameOver) return;
    draw();
    update();
    requestAnimationFrame(loop);
}

</script>
