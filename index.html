class Bullet{

  

constructor(

x,y,

ang,

spd,

color,

r=5,

dmg=1

){

  

this.x=x;

this.y=y;

  

this.vx=

Math.cos(ang)*spd;

  

this.vy=

Math.sin(ang)*spd;

  

this.color=color;

  

this.r=r;

  

this.dmg=dmg;

}

  

update(){

  

this.x+=this.vx;

this.y+=this.vy;

}

  

draw(){

  

ctx.shadowColor=

this.color;

  

ctx.shadowBlur=15;

  

ctx.fillStyle=

this.color;

  

ctx.beginPath();

  

ctx.arc(

this.x,

this.y,

this.r,

0,

Math.PI*2

);

  

ctx.fill();

  

ctx.shadowBlur=0;

}

}

  

function nextChapter(){

selectedChapter++;

if(selectedChapter > maxChapter) selectedChapter = 1;

selectChapter(selectedChapter);

}

  

function prevChapter(){

selectedChapter--;

if(selectedChapter < 1) selectedChapter = maxChapter;

selectChapter(selectedChapter);

}

return true;

}

ctx.shadowColor = "#99eeff";

ctx.shadowBlur = 25;

  

let size = 100; // CỐ ĐỊNH, KHÔNG DAO ĐỘNG

  

ctx.fillRect(

player.x - size/2,

player.y - size/2,

size,

size

);

  

ctx.restore();

}

  

// ===== PARALYZE THƯỜNG: XANH LÁ =====

else{

  

ctx.strokeStyle = "#44ff66";

ctx.lineWidth = 4;

ctx.shadowColor = "#66ff88";

ctx.shadowBlur = 15;

  

for(let i = 0; i < 6; i++){

  

ctx.beginPath();

  

ctx.moveTo(

player.x + (Math.random() - 0.5) * 40,

player.y + (Math.random() - 0.5) * 40

);

  

ctx.lineTo(

player.x + (Math.random() - 0.5) * 40,

player.y + (Math.random() - 0.5) * 40

);

  

ctx.stroke();

}

  

ctx.shadowBlur = 0;

}

}

  

rainbowLaser.forEach(l=>l.draw());

enemyBullets.forEach(b=>b.draw());

playerBullets.forEach(b=>b.draw());

dragonFire.forEach(b=>b.draw());

// =========================
// ARRAY EXPLOSIONS
// =========================
if(!window.explosions){

    window.explosions = [];
}

// =========================
// UPDATE EXPLOSIONS
// =========================
for(let i = explosions.length - 1; i >= 0; i--){

    let e = explosions[i];

    if(e.update){
        e.update();
    }

    if(e.dead){
        explosions.splice(i,1);
    }
}

// =========================
// DRAW EXPLOSIONS
// =========================
for(let e of explosions){

    if(e.draw){
        e.draw();
    }
}
for(let c of cracks){

    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;

    ctx.beginPath();

    ctx.moveTo(c.x, c.y);

    let px = c.x;
    let py = c.y;

    for(let j = 0; j < 6; j++){

        px +=
        Math.cos(
            c.ang +
            (Math.random() - 0.5) * 0.5
        ) * (c.len / 6);

        py +=
        Math.sin(
            c.ang +
            (Math.random() - 0.5) * 0.5
        ) * (c.len / 6);

        ctx.lineTo(px, py);
    }

    ctx.stroke();
}
dataBits.forEach(b=>{

  

ctx.fillStyle =

"#00ff66";

  

ctx.font =

"bold 22px monospace";

  

ctx.shadowColor =

"#00ff66";

  

ctx.shadowBlur = 12;

  

ctx.fillText(

b.txt,

b.x,

b.y

);

  

ctx.shadowBlur = 0;

});
// ======================
// MIRROR INVERT EFFECT (giống Touhou)
// ======================
if(reverseMode > 0){
    ctx.fillStyle = "white";
    ctx.globalCompositeOperation = "difference";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = "source-over";
}
    ctx.filter = "none";   // Reset filter
ctx.restore();
}

  

function loop(){

if(gameOver) return;

draw();

update();

requestAnimationFrame(loop);

}

  

</script>
