function selectCharacter(id){

if(

){

        }

}

class Bullet{

    constructor(
        x,y,
        ang,
        spd,
        color,
        r=5,
        dmg=1
    ){

        this.x=x;
        this.y=y;

        this.vx=
        Math.cos(ang)*spd;

        this.vy=
        Math.sin(ang)*spd;

        this.color=color;

        this.r=r;

        this.dmg=dmg;
    }

    update(){

        this.x+=this.vx;
        this.y+=this.vy;
    }

    draw(){

        ctx.shadowColor=
        this.color;

        ctx.shadowBlur=15;

        ctx.fillStyle=
        this.color;

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.r,
            0,
            Math.PI*2
        );

        ctx.fill();

        ctx.shadowBlur=0;
    }
}

function nextChapter(){
    selectedChapter++;
    if(selectedChapter > maxChapter) selectedChapter = 1;
    selectChapter(selectedChapter);
}

function prevChapter(){
    selectedChapter--;
    if(selectedChapter < 1) selectedChapter = maxChapter;
    selectChapter(selectedChapter);
}

function canUseCharacter(id, chapter){

    // Seraphine chỉ chapter 1
    if(id === 4 && chapter !== 1){
        return false;
    }

    // Nerissa không có chapter 1
    if(id === 5 && chapter === 1){

    return true;
}

// =======================
// CHAPTER 1 PATTERN
// =======================

function spawnPatternChapter1(){

    let cycle =
    frame % 1200;

    // =================
    // PHASE 1
    // ORB NỔ
    // =================

    if(cycle < 400){

        if(frame % 120 === 0){

            let ang =
            Math.atan2(
                player.y - boss.y,
                player.x - boss.x
            );

            enemyBullets.push({

                x: boss.x,
                y: boss.y,

                vx: Math.cos(ang) * 6,
                vy: Math.sin(ang) * 6,

                r: 45,
dmg: 2,
                life: 100,

                update(){

                    this.x += this.vx;
                    this.y += this.vy;

                    this.life--;

                    if(this.life === 0){

                        for(let i=0;i<18;i++){

                            let b = new Bullet(
                                this.x,
                                this.y,
                                i*Math.PI*2/18,
                                6,
                                "#99ddff",
                                10,
                                1
                            );

                            b.life = 60;

                            b.update = function(){

                                this.x += this.vx;
                                this.y += this.vy;

                                this.life--;

                                if(this.life <= 0){
                                    this.dead = true;
                                }
                            };

                            enemyBullets.push(b);
                        }

                        screenShake = 25;
                    }

                    if(this.life <= -10){
                        this.dead = true;
                    }
                },

                draw(){

                    ctx.fillStyle =
                    "#bfefff";

                    ctx.shadowColor =
                    "#ccffff";

                    ctx.shadowBlur = 25;

                    ctx.beginPath();

                    ctx.arc(
                        this.x,
                        this.y,
                        this.r,
                        0,
                        Math.PI*2
                    );

                    ctx.fill();

                    ctx.shadowBlur = 0;
                }
            });
        }
    }

    // =================
    // PHASE 2
    // ICE PILLAR
    // =================

    else if(cycle < 800){

        if(frame % 100 === 0){

            let x =
            player.x +
            (Math.random()-0.5)*180;

            enemyBullets.push({

                x:x,
                y:-120,

                w:80,
                h:220,

                vy:10,

                update(){

                    this.y += this.vy;

                    if(this.y > canvas.height-220){
                        screenShake = 15;
                    }
                },

                draw(){

                    ctx.fillStyle =
                    "#88e6ff";

                    ctx.shadowColor =
                    "#aaffff";

                    ctx.shadowBlur = 20;

                    ctx.fillRect(
                        this.x-this.w/2,
                        this.y,
                        this.w,
                        this.h
                    );

                    ctx.shadowBlur = 0;
                }
            });
        }
    }

    // =================
    // PHASE 3
    // ICE WAVE
    // =================

    else{

        if(frame % 200 === 0){

            screenShake = 40;

            for(let i=0;i<30;i++){

                enemyBullets.push(

                    new Bullet(
                        boss.x,
                        boss.y + 60,

                        Math.PI +
                        (i-15)*0.2,

                        8,

                        "#d9ffff",

                        12,
                        2
                    )
                );
            }
        }
    }
}

function spawnPatternVireltha(){

else if(cycle < 700){

}

// =======================
// NYXARA PATTERN
// =======================

function spawnPatternNyxara(){

    let cycle =
    frame % 1400;

    // =================
    // DARK RAIN
    // =================

    if(cycle < 350){

        if(frame % 10 === 0){

            let b =
            new Bullet(
                Math.random()*canvas.width,
                -20,
                Math.PI/2,
                7,
                "#111111",
                9,
                1
            );

            b.dark = true;

            enemyBullets.push(b);
        }
    }

    // =================
    // HỒ BÓNG TỐI
    // =================

else if(cycle < 700){

    if(frame % 120 === 0){

        enemyBullets.push({

            x: player.x,
            y: player.y,

            r: 25,

            life: 180,

            // delay 1 giây
            delay: 60,

            active: false,

            update(){

                // đếm delay trước
                if(this.delay > 0){

                    this.delay--;

                    // hiệu ứng cảnh báo
                    this.r += 0.15;

                    if(this.delay <= 0){
                        this.active = true;
                    }

                    return;
                }

                this.life--;

                this.r += 1;

                if(this.life <= 0){
                    this.dead = true;
                }
            },

            draw(){

                // WARNING trước khi xuất hiện
                if(!this.active){

                    ctx.strokeStyle =
                    "rgba(170,100,255,0.9)";

                    ctx.lineWidth = 4;

                    ctx.shadowColor =
                    "#aa66ff";

                    ctx.shadowBlur = 20;

                    ctx.beginPath();

                    ctx.arc(
                        this.x,
                        this.y,
                        this.r,
                        0,
                        Math.PI*2
                    );

                    ctx.stroke();

                    ctx.shadowBlur = 0;

                    return;
                }

                // hố thật sự
                ctx.fillStyle =
                "rgba(0,0,0,0.75)";

                ctx.shadowColor =
                "#5522aa";

                ctx.shadowBlur = 35;

                ctx.beginPath();

                ctx.arc(
                    this.x,
                    this.y,
                    this.r,
                    0,
                    Math.PI*2
                );

                ctx.fill();

                ctx.shadowBlur = 0;
            }
        });
    }
}

    else if(cycle < 1100){

        if(frame%50===0){

            for(let i=0;i<8;i++){

                let ang=i*Math.PI*2/8;

                let drop=new Bullet(
                    boss.x,
                    boss.y,
                    ang,
                    2,
                    "black",
                    12,
                    2
                );

                drop.bounced=false;

                drop.update=function(){

                    this.x+=this.vx;
                    this.y+=this.vy;

                    if(!this.bounced){

                        let hit=false;

                        if(this.x<=this.r||this.x>=canvas.width-this.r){
                            this.vx*=-1;
                            hit=true;
                        }

                        if(this.y<=this.r||this.y>=canvas.height-this.r){
                            this.vy*=-1;
                            hit=true;
                        }

                        if(hit){
                            this.bounced=true;
                        }
                    }
                };

                drop.draw=function(){

                    ctx.save();
                    ctx.translate(this.x,this.y);

                    let ang=Math.atan2(this.vy,this.vx);
                    ctx.rotate(ang+Math.PI/2);

                    ctx.shadowColor="black";
                    ctx.shadowBlur=20;

                    ctx.fillStyle="#111";

                    ctx.beginPath();
                    ctx.moveTo(0,-18);
                    ctx.quadraticCurveTo(18,-8,12,10);
                    ctx.lineTo(6,26);
                    ctx.lineTo(-6,26);
                    ctx.lineTo(-12,10);
                    ctx.quadraticCurveTo(-18,-8,0,-18);
                    ctx.fill();

                    ctx.strokeStyle="#000";
                    ctx.lineWidth=4;

                    for(let i=-1.5;i<=1.5;i++){
                        ctx.beginPath();
                        ctx.moveTo(i*6,24);
                        ctx.lineTo(i*10,36);
                        ctx.stroke();
                    }

                    ctx.fillStyle="red";
                    ctx.beginPath();
                    ctx.arc(-5,-2,2,0,Math.PI*2);
                    ctx.arc(5,-2,2,0,Math.PI*2);
                    ctx.fill();

                    ctx.restore();
                };

                enemyBullets.push(drop);
            }
        }
    }

    // =================
    // MẤT KIỂM SOÁT
    // =================

function spawnThalvorn(){

    let cycle = frame % 1200;

    // =====================
    // PHASE 1 - GLITCH SHOT
    // =====================
    if(cycle < 400){

        if(frame % 5 === 0){

            let x = Math.random()*canvas.width;

            enemyBullets.push({
                x:x,
                y:-100,
                w:20,
                h:140,
                vy:10,

                update(){
                    this.y += this.vy;
                    this.x += Math.sin(this.y*0.05)*3;
                },

                draw(){
                    ctx.fillStyle="#aa00ff";
                    ctx.shadowBlur=25;
                    ctx.fillRect(this.x,this.y,this.w,this.h);
                    ctx.shadowBlur=0;
                }
            });
        }
    }

    // =====================
    // PHASE 2 - FRACTURE BULLETS
    // =====================
    else if(cycle < 800){

        if(frame % 60 === 0){

            let ang = Math.atan2(player.y-boss.y, player.x-boss.x);

            let main = new Bullet(
                boss.x,
                boss.y,
                ang,
                7,
                "#ff00ff",
                10,
                2
            );

            main.timer = 40;

            main.update = function(){

                this.x += this.vx;
                this.y += this.vy;

                this.timer--;

                if(this.timer <= 0){

                    for(let i=0;i<12;i++){

                        enemyBullets.push(
                            new Bullet(
                                this.x,
                                this.y,
                                i*Math.PI*2/12,
                                6,
                                "#ffffff",
                                6,
                                1
                            )
                        );
                    }

                    this.dead = true;
                }
            };

            enemyBullets.push(main);
        }
    }

    // =====================
    // PHASE 3 - REALITY BREAK
    // =====================
    else if(cycle < 1000){

        if(frame % 40 === 0){

            boss.x = canvas.width/2 + (Math.random()-0.5)*300;

            for(let i=0;i<30;i++){

                enemyBullets.push(
                    new Bullet(
                        boss.x,
                        boss.y,
                        i*Math.PI*2/30,
                        5 + Math.random()*2,
                        "#00ffff",
                        8,
                        2
                    )
                );
            }

            screenShake = 20;
        }
    }

    // =====================
    // PHASE 4 - REWIND ORBIT
    // =====================
    else if(cycle < 1100){

        if(frame % 12 === 0){

            let count = 14;

            for(let i=0;i<count;i++){

                let ang = (i * Math.PI*2/count) + frame*0.03;
                let r = 120;

                let b = new Bullet(
                    boss.x + Math.cos(ang)*r,
                    boss.y + Math.sin(ang)*r,
                    ang + Math.PI,
                    3,
                    "#ff66ff",
                    7,
                    1
                );

                b.centerX = boss.x;
                b.centerY = boss.y;

                b.update = function(){

                    let dx = this.x - this.centerX;
                    let dy = this.y - this.centerY;

                    let ang = Math.atan2(dy, dx) + 0.06;
                    let dist = Math.hypot(dx, dy);

                    this.x = this.centerX + Math.cos(ang) * dist;
                    this.y = this.centerY + Math.sin(ang) * dist;

                    let pa = Math.atan2(player.y - this.y, player.x - this.x);

                    this.x += Math.cos(pa) * 0.4;
                    this.y += Math.sin(pa) * 0.4;
                };

                enemyBullets.push(b);
            }

            screenShake = 10;
        }
    }

    // =====================
    // PHASE 5 - CORE BREAK
    // =====================
    else{

        if(frame % 28 === 0){

            boss.x = canvas.width/2 + (Math.random()-0.5)*380;
            boss.y = 120 + (Math.random()-0.5)*80;

            for(let i=0;i<36;i++){

                let ang = i * Math.PI*2/36;
                let spd = 3 + Math.random()*4;

                let b = new Bullet(
                    boss.x,
                    boss.y,
                    ang,
                    spd,
                    "#ffffff",
                    6,
                    2
                );

                b.update = function(){

                    this.x += this.vx;
                    this.y += this.vy;

                    this.vx += Math.sin(frame*0.02)*0.02;
                    this.vy += Math.cos(frame*0.02)*0.02;
                };

                enemyBullets.push(b);
            }

            for(let i=0;i<12;i++){

                enemyBullets.push(
                    new Bullet(
                        boss.x,
                        boss.y,
                        i*Math.PI*2/12,
                        8,
                        "#00ffff",
                        10,
                        3
                    )
                );
            }

            screenFlash = 20;
            screenShake = 25;
        }
    }
}
